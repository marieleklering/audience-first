name: Vale Linter

on:
  push:
    branches: [main]

jobs:
  vale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: errata-ai/vale-action@reviewdog
        with:
          files: |
            README.md
            claude-project-setup.md
            test-doc.md
            docs/
          styles: |
            https://vale.sh/api/v1/tree/Google
